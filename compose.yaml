services:
  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: main
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      # PostgreSQL stores data in /var/lib/postgresql/data inside the container.
      # This persists data to the volume `main_data`
      - main_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  main_data: